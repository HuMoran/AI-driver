name: Auto Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag is strict semver
        id: semver
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if [[ "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_semver=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_semver=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping non-semver tag $GITHUB_REF_NAME (not X.Y.Z); no release will be created."
          fi

      - name: Extract CHANGELOG section to file
        if: steps.semver.outputs.is_semver == 'true'
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          # Extractor:
          #   - structural heading match (no regex interpolation)
          #   - fenced-code state tracking so '## [' inside ``` does NOT terminate
          #   - CRLF-tolerant
          awk -v v="$VER" '
            BEGIN { found = 0; in_fence = 0 }
            {
              # Normalize CRLF
              sub(/\r$/, "")

              # Toggle fence state on ``` or ~~~ at column 1 (optional info string).
              if ($0 ~ /^(```|~~~)/) { in_fence = !in_fence; if (found) { print; next } }

              if (!found) {
                # Only look for the target heading at column 1, outside fences.
                if (!in_fence && index($0, "## [" v "]") == 1) { found = 1; next }
              } else {
                # Terminate only at a real next release heading (not inside a fence).
                if (!in_fence && index($0, "## [") == 1) { exit }
                print
              }
            }
          ' CHANGELOG.md > release-notes.md

          # Empty-section check: require at least one non-heading, non-marker-only line.
          # Strips out headings, blank lines, bare fence delimiters, and bare/empty
          # markers so that a section which only contains "- " or "| " still fails.
          SUBSTANTIVE=$(awk '
            BEGIN { in_fence = 0 }
            {
              sub(/\r$/, "")
              if ($0 ~ /^(```|~~~)/) { in_fence = !in_fence; next }
              if (in_fence) { if (/[^[:space:]]/) print "CONTENT"; next }
              # Skip blank
              if ($0 ~ /^[[:space:]]*$/) next
              # Skip headings
              if ($0 ~ /^#+[[:space:]]/) next
              # Skip bare bullet / ordered / table / fence markers with no payload
              if ($0 ~ /^([*+-]|[0-9]+\.)[[:space:]]*$/) next
              if ($0 ~ /^\|[[:space:]-]*\|?[[:space:]]*$/) next
              print "CONTENT"
            }
          ' release-notes.md | wc -l)

          if [ "$SUBSTANTIVE" -lt 1 ]; then
            echo "::error::CHANGELOG.md section for $VER has no substantive content (only headings, blank lines, or empty markers). Populate it under ### Added / ### Fixed / ### Changed."
            exit 1
          fi

          echo "Extracted release notes ($(wc -c < release-notes.md) bytes, $SUBSTANTIVE substantive lines) for $GITHUB_REF_NAME"
          echo "--- preview ---"
          head -40 release-notes.md

      - name: Create GitHub Release
        if: steps.semver.outputs.is_semver == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --notes-file preserves every byte from the awk output, avoiding
          # shell-var trailing-newline stripping and heredoc delimiter collisions.
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
